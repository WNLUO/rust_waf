<svg width="1800" height="900" viewBox="0 0 1800 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF" />
    </marker>
  </defs>

  <rect width="1800" height="900" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1704" height="804" rx="30" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="2"/>
  <text x="92" y="120" fill="#111827" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="700">HTTP 多协议统一请求抽象示意</text>

  <!-- 左侧：多协议输入 -->
  <rect x="120" y="180" width="380" height="180" rx="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="310" y="250" text-anchor="middle" fill="#1E3A8A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">HTTP/1.1</text>
  <text x="310" y="300" text-anchor="middle" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">请求行 + Header + Body</text>

  <rect x="120" y="400" width="380" height="180" rx="24" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="310" y="470" text-anchor="middle" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">HTTP/2</text>
  <text x="310" y="520" text-anchor="middle" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">多路复用 / 二进制流与帧</text>

  <rect x="120" y="620" width="380" height="180" rx="24" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="310" y="690" text-anchor="middle" fill="#78350F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">HTTP/3</text>
  <text x="310" y="740" text-anchor="middle" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">QUIC 传输 / 提取头与流数据</text>

  <!-- 中间连线区 -->
  <path d="M 500 270 L 660 270" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <path d="M 500 490 L 660 490" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <path d="M 500 710 L 660 710" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow-blue)"/>

  <!-- 右侧：统一抽象 -->
  <rect x="680" y="180" width="980" height="620" rx="30" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="1170" y="270" text-anchor="middle" fill="#4C1D95" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="700">UnifiedHttpRequest 统一请求抽象</text>
  
  <text x="1170" y="360" text-anchor="middle" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">【 字段归一化 】</text>
  <text x="1170" y="420" text-anchor="middle" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28">• 方法、URI、头部、请求体、源地址</text>
  <text x="1170" y="470" text-anchor="middle" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28">• 协议版本、代理元数据、预检标记</text>
  
  <text x="1170" y="580" text-anchor="middle" fill="#6D28D9" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">【 后续统一检测链 】</text>
  <text x="1170" y="640" text-anchor="middle" fill="#6D28D9" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28">行为检测 → CC 防护预检 → L7 规则引擎裁决</text>

  <rect x="740" y="700" width="860" height="70" rx="20" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
  <text x="1170" y="744" text-anchor="middle" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">核心收益：屏蔽底层协议传输差异，安全判断主逻辑只需编写一次。</text>
</svg>
