<svg width="1600" height="840" viewBox="0 0 1600 840" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="840" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1504" height="744" rx="30" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="2"/>
  <text x="92" y="108" fill="#111827" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700">浏览器指纹诱导链路流程</text>

  <rect x="100" y="180" width="280" height="520" rx="28" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="140" y="246" fill="#1E3A8A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">1. 触发诱导规则</text>
  <text x="140" y="304" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">规则动作为 respond</text>
  <text x="140" y="342" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">绑定指纹采集模板</text>
  <text x="140" y="398" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">向客户端返回看似正常的</text>
  <text x="140" y="426" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">HTML 页面，内部嵌入</text>
  <text x="140" y="454" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">自研采集脚本。</text>

  <rect x="430" y="180" width="320" height="520" rx="28" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="470" y="246" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">2. 浏览器侧采集</text>
  <text x="470" y="304" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">Canvas / WebGL</text>
  <text x="470" y="342" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">字体、时区、语言</text>
  <text x="470" y="380" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">屏幕尺寸 / Viewport</text>
  <text x="470" y="418" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">Webdriver 运行状态</text>
  <text x="470" y="476" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">生成唯一指纹标识，</text>
  <text x="470" y="504" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">结果序列化为 JSON。</text>

  <rect x="800" y="180" width="320" height="520" rx="28" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="840" y="246" fill="#78350F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">3. 诱导式对抗层</text>
  <text x="840" y="304" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">高数挑战干扰面板</text>
  <text x="840" y="342" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">无真实通过路径</text>
  <text x="840" y="380" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">记录尝试次数与行为</text>
  <text x="840" y="418" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">延迟回传作答摘要</text>
  <text x="840" y="476" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">定位为攻击路径干扰</text>
  <text x="840" y="504" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">与高价值画像采集。</text>

  <rect x="1170" y="180" width="320" height="520" rx="28" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="1210" y="246" fill="#4C1D95" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">4. 审计事件落库</text>
  <text x="1210" y="304" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">POST 上报接口</text>
  <text x="1210" y="342" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">补充服务端元数据</text>
  <text x="1210" y="380" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">写入安全事件库</text>
  <text x="1210" y="438" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">沉淀身份画像，形成</text>
  <text x="1210" y="466" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">诱导、采集、审计的</text>
  <text x="1210" y="494" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">完整对抗闭环。</text>

  <path d="M380 440H430" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round"/>
  <path d="M750 440H800" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round"/>
  <path d="M1120 440H1170" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round"/>
  <path d="M412 440L394 428V452L412 440Z" fill="#9CA3AF"/>
  <path d="M782 440L764 428V452L782 440Z" fill="#9CA3AF"/>
  <path d="M1152 440L1134 428V452L1152 440Z" fill="#9CA3AF"/>
</svg>
