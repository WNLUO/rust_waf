<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="1560" viewBox="0 0 1840 1560" role="img" aria-labelledby="title desc">
  <title id="title">CDN-Rust-雷池-Nginx CC 防护时序图</title>
  <desc id="desc">展示用户、CDN、Rust、雷池 WAF、Nginx 与 SQLite 之间的 CC 攻击处理时序。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; }
      .lane-text { font: 700 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; text-anchor: middle; }
      .lifeline { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; }
      .msg { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .msg-red { stroke: #b91c1c; stroke-width: 2.4; fill: none; marker-end: url(#arrow-red); }
      .msg-green { stroke: #166534; stroke-width: 2.4; fill: none; marker-end: url(#arrow-green); }
      .msg-dashed { stroke-dasharray: 8 6; }
      .msg-text { font: 500 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1e293b; text-anchor: middle; }
      .msg-text-sm { font: 500 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1e293b; text-anchor: middle; }
      .small-text { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; text-anchor: middle; }
      .note { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; rx: 14; }
      .note-warn { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; rx: 14; }
      .note-risk { fill: #fef2f2; stroke: #fca5a5; stroke-width: 1.5; rx: 14; }
      .note-good { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.5; rx: 14; }
      .note-title { font: 700 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .note-body { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .group { fill: rgba(255,255,255,0.7); stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .group-label { font: 700 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1840" height="1560"/>

  <text class="title" x="60" y="52">CC 攻击链路时序图（当前 Rust 实现）</text>
  <text class="subtitle" x="60" y="84">链路：用户 ↔ CDN ↔ Rust ↔ 雷池 WAF ↔ Nginx</text>
  <text class="subtitle" x="60" y="108">说明：SQLite 只负责事件与封禁记录落库，不在主流量链路上转发请求</text>

  <!-- participants -->
  <rect class="lane" x="70" y="144" width="180" height="62"/>
  <rect class="lane" x="320" y="144" width="180" height="62"/>
  <rect class="lane" x="570" y="144" width="180" height="62"/>
  <rect class="lane" x="820" y="144" width="180" height="62"/>
  <rect class="lane" x="1070" y="144" width="180" height="62"/>
  <rect class="lane" x="1320" y="144" width="180" height="62"/>

  <text class="lane-text" x="160" y="182">用户 / 攻击端</text>
  <text class="lane-text" x="410" y="182">CDN</text>
  <text class="lane-text" x="660" y="182">Rust</text>
  <text class="lane-text" x="910" y="182">雷池 WAF</text>
  <text class="lane-text" x="1160" y="182">Nginx</text>
  <text class="lane-text" x="1410" y="182">SQLite</text>

  <!-- lifelines -->
  <line class="lifeline" x1="160" y1="206" x2="160" y2="1470"/>
  <line class="lifeline" x1="410" y1="206" x2="410" y2="1470"/>
  <line class="lifeline" x1="660" y1="206" x2="660" y2="1470"/>
  <line class="lifeline" x1="910" y1="206" x2="910" y2="1470"/>
  <line class="lifeline" x1="1160" y1="206" x2="1160" y2="1470"/>
  <line class="lifeline" x1="1410" y1="206" x2="1410" y2="1470"/>

  <!-- top note -->
  <rect class="note" x="88" y="236" width="520" height="100"/>
  <text class="note-title" x="110" y="264">前提</text>
  <text class="note-body" x="110" y="290">CC 先打到 CDN。</text>
  <text class="note-body" x="110" y="310">Rust 接收到的是 CDN 放行后的流量。</text>
  <text class="note-body" x="110" y="330">当前 Rust 的 L4 判定主体仍偏向 peer_ip，也就是 CDN 节点 IP。</text>

  <!-- initial traffic -->
  <line class="msg" x1="160" y1="370" x2="410" y2="370"/>
  <text class="msg-text" x="285" y="359">1. 用户发起 HTTP/HTTPS 请求</text>

  <line class="msg" x1="410" y1="420" x2="660" y2="420"/>
  <text class="msg-text" x="535" y="409">2. CDN 将幸存流量转发到 Rust</text>

  <!-- path A group -->
  <rect class="group" x="460" y="462" width="500" height="370"/>
  <text class="group-label" x="710" y="490">路径 A：Rust 在前置 L4 / 行为桶阶段处理压力</text>

  <line class="msg" x1="660" y1="530" x2="660" y2="580"/>
  <text class="msg-text-sm" x="760" y="560">3. L4 检查</text>

  <rect class="note-warn" x="900" y="500" width="520" height="154"/>
  <text class="note-title" x="922" y="528">Rust 这里看见的主要是谁</text>
  <text class="note-body" x="922" y="554">大多数 L4 统计、限速、burst 判定，核心仍然看 socket peer IP。</text>
  <text class="note-body" x="922" y="574">在 CDN 前置时，它更像“CDN 节点到 Rust 的压力”。</text>
  <text class="note-body" x="922" y="594">它不是最终用户粒度。</text>

  <line class="msg-red" x1="660" y1="630" x2="410" y2="630"/>
  <text class="msg-text" x="535" y="619">4A. 连接速率 / burst / simple_ddos 命中</text>

  <line class="msg-red msg-dashed" x1="660" y1="680" x2="1410" y2="680"/>
  <text class="msg-text" x="1035" y="669">5A. 落库事件 / 可选 blocked_ip</text>

  <line class="msg-red" x1="660" y1="730" x2="410" y2="730"/>
  <text class="msg-text" x="535" y="719">6A. 直接拒绝连接 / 丢弃 / 结束</text>

  <line class="msg-green" x1="660" y1="785" x2="660" y2="835"/>
  <text class="msg-text" x="810" y="815">4B. L4 放行，进入行为桶阶段</text>

  <rect class="note-good" x="890" y="760" width="560" height="170"/>
  <text class="note-title" x="912" y="788">行为桶可能触发的动作</text>
  <text class="note-body" x="912" y="814">按 peer_ip + host + 协议累计 recent_connections、recent_requests、feedback。</text>
  <text class="note-body" x="912" y="834">风险升高后可增加 delay，禁用 keep-alive、提前 close、返回 429。</text>
  <text class="note-body" x="912" y="854">它更像“连接压力退化控制”，不是完整的真实用户级 CC 挑战系统。</text>

  <!-- request reaches proxy stage -->
  <line class="msg" x1="660" y1="950" x2="660" y2="1000"/>
  <text class="msg-text-sm" x="835" y="980">7. 解析 client_ip，进入代理链路</text>

  <rect class="note" x="80" y="900" width="500" height="170"/>
  <text class="note-title" x="102" y="928">真实 IP 解析发生在哪里</text>
  <text class="note-body" x="102" y="954">Rust 会在 L7 请求对象上解析 client_ip，并补写 X-Real-IP / X-Forwarded-For。</text>
  <text class="note-body" x="102" y="974">但这不会自动改变前面 L4 限速与行为桶对 peer_ip 的使用方式。</text>
  <text class="note-body" x="102" y="994">所以“会记录真实 IP”不等于“已按真实 IP 做 L4 CC 防御”。</text>

  <!-- own l7 rules -->
  <line class="msg" x1="660" y1="1090" x2="660" y2="1140"/>
  <text class="msg-text" x="744" y="1120">8. Rust 自身 L7 检查</text>

  <line class="msg-red msg-dashed" x1="660" y1="1180" x2="1410" y2="1180"/>
  <text class="msg-text-sm" x="1035" y="1169">9A. 自身 L7 命中：落库并回灌 feedback</text>

  <line class="msg-red" x1="660" y1="1230" x2="410" y2="1230"/>
  <text class="msg-text" x="535" y="1219">10A. 403 / 自定义响应 / tarpit</text>

  <!-- proxy path -->
  <rect class="group" x="610" y="1270" width="690" height="210"/>
  <text class="group-label" x="955" y="1298">路径 B：Rust 未先拦截，继续代理到雷池与 Nginx</text>

  <line class="msg" x1="660" y1="1340" x2="910" y2="1340"/>
  <text class="msg-text" x="785" y="1329">9B. Rust 代理请求到雷池 WAF</text>

  <line class="msg" x1="910" y1="1380" x2="1160" y2="1380"/>
  <text class="msg-text" x="1035" y="1369">10B. 雷池放行则继续转发到 Nginx</text>

  <line class="msg msg-dashed" x1="1160" y1="1420" x2="910" y2="1420"/>
  <text class="msg-text" x="1035" y="1409">11B. Nginx 返回正常响应</text>

  <line class="msg msg-dashed" x1="910" y1="1460" x2="660" y2="1460"/>
  <text class="msg-text-sm" x="785" y="1449">12B. 正常响应回 Rust，再回 CDN</text>

  <!-- safeline intercept branch note -->
  <rect class="note-risk" x="1320" y="1268" width="430" height="228"/>
  <text class="note-title" x="1342" y="1296">若雷池拦截会发生什么</text>
  <text class="note-body" x="1342" y="1322">Rust 会识别 403/405、safeline 特征、event_id、响应头签名。</text>
  <text class="note-body" x="1342" y="1342">然后执行 pass / replace / drop / replace_and_block_ip。</text>
  <text class="note-body" x="1342" y="1362">同时落库 safeline intercept 事件，并给行为桶回灌 SafeLine feedback。</text>
  <text class="note-body" x="1342" y="1382">replace_and_block_ip 当前主要是写 SQLite 记录。</text>
  <text class="note-body" x="1342" y="1402">它不是立即写入 Rust 运行时 L4 block 表。</text>

  <!-- footer summary -->
  <rect class="note" x="80" y="1498" width="1680" height="50"/>
  <text class="note-body" x="920" y="1520" text-anchor="middle">总结：当前 Rust 更擅长处理 CDN → Rust 这一跳的连接压力与雷池拦截接管；</text>
  <text class="note-body" x="920" y="1540" text-anchor="middle">若要做真实用户级 CC 防护，还需要把真实 IP 引入 L4 / 行为桶主判定链路。</text>
</svg>
