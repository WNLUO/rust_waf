<svg width="2000" height="900" viewBox="0 0 2000 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF" />
    </marker>
  </defs>

  <rect width="2000" height="900" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1904" height="804" rx="30" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="2"/>
  <text x="92" y="120" fill="#111827" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="700">Rust WAF 系统功能思维导图</text>

  <!-- 顶部主节点 -->
  <rect x="700" y="180" width="600" height="120" rx="30" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="1000" y="250" text-anchor="middle" fill="#1E3A8A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700">基于 Rust 的 L4 / L7 协同防护系统</text>

  <!-- 连线 (从顶部中央到下层五个节点) -->
  <path d="M 1000 300 V 360 H 260 V 400" stroke="#9CA3AF" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 1000 300 V 360 H 630 V 400" stroke="#9CA3AF" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 1000 300 V 400" stroke="#9CA3AF" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 1000 300 V 360 H 1370 V 400" stroke="#9CA3AF" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 1000 300 V 360 H 1740 V 400" stroke="#9CA3AF" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- 下层节点 1: 接入层 (x=100) -->
  <rect x="100" y="420" width="320" height="350" rx="24" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="2"/>
  <text x="260" y="480" text-anchor="middle" fill="#0C4A6E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">接入层</text>
  <text x="140" y="540" fill="#075985" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• TCP 监听</text>
  <text x="140" y="590" fill="#075985" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• UDP / QUIC</text>
  <text x="140" y="640" fill="#075985" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• TLS 安全卸载</text>
  <text x="140" y="690" fill="#075985" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• HTTP/1.1、2、3 入口</text>

  <!-- 下层节点 2: L4 防护 (x=470) -->
  <rect x="470" y="420" width="320" height="350" rx="24" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="630" y="480" text-anchor="middle" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">L4 防护层</text>
  <text x="510" y="540" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• L4 连接跟踪</text>
  <text x="510" y="590" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 黑名单与速率限制</text>
  <text x="510" y="640" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 风险分桶治理</text>
  <text x="510" y="690" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 自适应连接预算</text>

  <!-- 下层节点 3: L7 防护 (x=840) -->
  <rect x="840" y="420" width="320" height="350" rx="24" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="1000" y="480" text-anchor="middle" fill="#4C1D95" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">L7 防护层</text>
  <text x="880" y="540" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 多协议请求抽象</text>
  <text x="880" y="590" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• CC 防护与行为识别</text>
  <text x="880" y="640" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 正则与规则引擎</text>
  <text x="880" y="690" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 模板响应 / 指纹诱导</text>

  <!-- 下层节点 4: 网关治理 (x=1210) -->
  <rect x="1210" y="420" width="320" height="350" rx="24" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="1370" y="480" text-anchor="middle" fill="#78350F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">网关治理层</text>
  <text x="1250" y="540" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 多站点域映射</text>
  <text x="1250" y="590" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 证书托管与复用</text>
  <text x="1250" y="640" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 上游健康检查</text>
  <text x="1250" y="690" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• Fail-open 容灾代理</text>

  <!-- 下层节点 5: 控制面 (x=1580) -->
  <rect x="1580" y="420" width="320" height="350" rx="24" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="1740" y="480" text-anchor="middle" fill="#7F1D1D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">控制与数据层</text>
  <text x="1620" y="540" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• SQLite 数据持久化</text>
  <text x="1620" y="590" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 实时流量采集与推送</text>
  <text x="1620" y="640" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 画像档案沉淀</text>
  <text x="1620" y="690" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">• 联动同步与管理控制台</text>
</svg>
