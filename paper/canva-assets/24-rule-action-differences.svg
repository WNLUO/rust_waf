<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="760" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1504" height="664" rx="28" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="2"/>
  <text x="92" y="108" fill="#111827" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700">规则动作差异化响应验证</text>

  <rect x="120" y="210" width="300" height="360" rx="28" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="160" y="280" fill="#1E3A8A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">基线 / alert</text>
  <text x="160" y="340" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">返回 `HTTP 200 OK`</text>
  <text x="160" y="380" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">业务逻辑继续处理</text>
  <text x="160" y="420" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">说明：仅记录审计事件</text>

  <rect x="500" y="210" width="300" height="360" rx="28" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="540" y="280" fill="#7F1D1D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">block</text>
  <text x="540" y="340" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">返回 `HTTP 403`</text>
  <text x="540" y="380" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">响应体输出阻断提示</text>
  <text x="540" y="420" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">说明：请求被立即中断</text>

  <rect x="880" y="210" width="300" height="360" rx="28" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="920" y="280" fill="#78350F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">respond</text>
  <text x="920" y="340" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">返回自定义状态码</text>
  <text x="920" y="380" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">输出模板化响应正文</text>
  <text x="920" y="420" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">说明：策略可高度定制</text>

  <rect x="1260" y="250" width="240" height="280" rx="28" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="1380" y="320" text-anchor="middle" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700">验证结论</text>
  <text x="1380" y="368" text-anchor="middle" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">系统不仅具备拦截能力</text>
  <text x="1380" y="402" text-anchor="middle" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">更能针对不同风险程度</text>
  <text x="1380" y="436" text-anchor="middle" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">导出差异化的响应路径</text>
</svg>
