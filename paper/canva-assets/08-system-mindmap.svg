<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="#F7F3EC"/>
  <rect x="42" y="42" width="1516" height="896" rx="30" fill="#FFFDFC" stroke="#D9D0C4" stroke-width="2"/>

  <text x="88" y="106" fill="#2E261F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700">基于 Rust 的 L4 / L7 协同 Web 防护系统思维导图</text>
  <text x="88" y="144" fill="#7B6F63" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">对应论文第 3 章的功能结构概览，可与总体架构图互相补充</text>

  <rect x="560" y="196" width="480" height="96" rx="28" fill="#E8F1FB" stroke="#82ACD7" stroke-width="2"/>
  <text x="800" y="250" text-anchor="middle" fill="#244C73" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700">Rust 实现的 L4 / L7 协同 Web 防护系统</text>

  <rect x="100" y="372" width="238" height="284" rx="24" fill="#EAF4FF" stroke="#7FB0E0" stroke-width="2"/>
  <text x="132" y="424" fill="#234A72" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">接入层</text>
  <text x="132" y="468" fill="#234A72" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">TCP 监听</text>
  <text x="132" y="504" fill="#234A72" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">UDP / QUIC</text>
  <text x="132" y="540" fill="#234A72" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">TLS 接入</text>
  <text x="132" y="576" fill="#234A72" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">HTTP/2 / HTTP/3</text>
  <text x="132" y="628" fill="#52708C" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">统一完成多协议入口、</text>
  <text x="132" y="656" fill="#52708C" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">监听与连接承载</text>

  <rect x="378" y="338" width="258" height="352" rx="24" fill="#EEF8EB" stroke="#8CB988" stroke-width="2"/>
  <text x="410" y="390" fill="#2E5D2E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">L4 防护层</text>
  <text x="410" y="434" fill="#2E5D2E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">连接跟踪</text>
  <text x="410" y="470" fill="#2E5D2E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">速率限制</text>
  <text x="410" y="506" fill="#2E5D2E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">黑名单阻断</text>
  <text x="410" y="542" fill="#2E5D2E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">风险分桶 / 过载分级</text>
  <text x="410" y="578" fill="#2E5D2E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">自适应连接预算</text>
  <text x="410" y="630" fill="#547653" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">负责早期粗筛与</text>
  <text x="410" y="658" fill="#547653" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">连接级快速收紧</text>

  <rect x="676" y="316" width="278" height="396" rx="24" fill="#F6EDF9" stroke="#B68AD3" stroke-width="2"/>
  <text x="708" y="368" fill="#6D3C88" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">L7 防护层</text>
  <text x="708" y="412" fill="#6D3C88" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">HTTP/1.1 解析</text>
  <text x="708" y="448" fill="#6D3C88" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">HTTP/2 / HTTP/3 转换</text>
  <text x="708" y="484" fill="#6D3C88" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">统一请求抽象</text>
  <text x="708" y="520" fill="#6D3C88" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">规则引擎</text>
  <text x="708" y="556" fill="#6D3C88" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">动作模板 / respond</text>
  <text x="708" y="592" fill="#6D3C88" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">浏览器指纹诱导</text>
  <text x="708" y="646" fill="#816198" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">负责语义级判定、</text>
  <text x="708" y="674" fill="#816198" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">模板响应与画像采集</text>

  <rect x="994" y="372" width="238" height="284" rx="24" fill="#FFF4DF" stroke="#DEB25C" stroke-width="2"/>
  <text x="1026" y="424" fill="#7B5410" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">网关治理层</text>
  <text x="1026" y="468" fill="#7B5410" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">站点映射</text>
  <text x="1026" y="504" fill="#7B5410" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">证书选择</text>
  <text x="1026" y="540" fill="#7B5410" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">上游健康检查</text>
  <text x="1026" y="576" fill="#7B5410" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">代理转发</text>
  <text x="1026" y="628" fill="#8F6D35" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">负责多站点接入、</text>
  <text x="1026" y="656" fill="#8F6D35" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">证书与后端治理</text>

  <rect x="1272" y="338" width="238" height="352" rx="24" fill="#FDECEE" stroke="#E19CA5" stroke-width="2"/>
  <text x="1304" y="390" fill="#8C3946" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">控制与数据层</text>
  <text x="1304" y="434" fill="#8C3946" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">管理 API</text>
  <text x="1304" y="470" fill="#8C3946" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">系统设置 / 证书管理</text>
  <text x="1304" y="506" fill="#8C3946" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">规则中心 / 动作中心</text>
  <text x="1304" y="542" fill="#8C3946" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">L4 / L7 管理</text>
  <text x="1304" y="578" fill="#8C3946" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">事件审计 / 联动同步</text>
  <text x="1304" y="630" fill="#9B636B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">负责分层运维、</text>
  <text x="1304" y="658" fill="#9B636B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">自动化接管总览与落库</text>

