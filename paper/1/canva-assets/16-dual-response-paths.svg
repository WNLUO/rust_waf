<svg width="1800" height="900" viewBox="0 0 1800 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF" />
    </marker>
  </defs>

  <rect width="1800" height="900" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1704" height="804" rx="30" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="2"/>
  <text x="92" y="120" fill="#111827" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="700">规则级响应与站点级响应接管双路径示意</text>

  <!-- 路径 A -->
  <rect x="150" y="180" width="600" height="420" rx="28" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="450" y="260" text-anchor="middle" fill="#1E3A8A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">路径 A：规则级响应</text>
  <text x="210" y="340" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26">• 触发条件：请求命中 L4/L7 规则</text>
  <text x="210" y="390" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26">• 匹配依据：pattern、layer、action</text>
  <text x="210" y="440" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26">• 输出动作：allow / alert / block / respond</text>
  <text x="210" y="510" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">说明：适合表达“某类请求特征命中后”</text>
  <text x="210" y="550" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">应该如何裁决的细粒度安全策略。</text>

  <!-- 路径 B -->
  <rect x="1050" y="180" width="600" height="420" rx="28" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="1350" y="260" text-anchor="middle" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">路径 B：站点级响应接管</text>
  <text x="1110" y="340" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26">• 触发条件：站点启用接管策略</text>
  <text x="1110" y="390" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26">• 模式：inherit / pass / drop / template</text>
  <text x="1110" y="440" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26">• 附加动作：可联动封禁源 IP</text>
  <text x="1110" y="510" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">说明：适合表达“站点整体上如何接管响应”</text>
  <text x="1110" y="550" fill="#4B5563" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">的治理型策略，侧重于统一响应控制。</text>

  <!-- 共同目标 -->
  <rect x="650" y="700" width="500" height="100" rx="28" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="900" y="760" text-anchor="middle" fill="#78350F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">共同目标：控制最终响应路径</text>

  <!-- 连线：折线效果 -->
  <!-- 左侧方框向下折向中间方框 -->
  <path d="M 450 600 V 650 H 800 V 700" fill="none" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <!-- 右侧方框向下折向中间方框 -->
  <path d="M 1350 600 V 650 H 1000 V 700" fill="none" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow-blue)"/>
</svg>
