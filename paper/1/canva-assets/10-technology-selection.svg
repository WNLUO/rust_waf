<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="760" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1504" height="660" rx="28" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="2"/>
  <text x="92" y="108" fill="#111827" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700">关键技术选型与设计取舍</text>

  <g font-family="PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="92" y="170" width="320" height="220" rx="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="128" y="228" fill="#1E3A8A" font-size="28" font-weight="700">Rust</text>
    <text x="128" y="282" fill="#1E40AF" font-size="20">面向长连接、并发 IO</text>
    <text x="128" y="318" fill="#1E40AF" font-size="20">需要更强内存安全与</text>
    <text x="128" y="352" fill="#1E40AF" font-size="20">协议状态控制能力</text>

    <rect x="452" y="170" width="320" height="220" rx="24" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
    <text x="488" y="228" fill="#14532D" font-size="28" font-weight="700">SQLite</text>
    <text x="488" y="282" fill="#166534" font-size="20">优先满足单机可部署、</text>
    <text x="488" y="318" fill="#166534" font-size="20">依赖少、事务完整、</text>
    <text x="488" y="352" fill="#166534" font-size="20">实验环境可复现</text>

    <rect x="812" y="170" width="320" height="220" rx="24" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <text x="848" y="228" fill="#78350F" font-size="28" font-weight="700">规则 + 模板</text>
    <text x="848" y="282" fill="#92400E" font-size="20">优先证明系统闭环和</text>
    <text x="848" y="318" fill="#92400E" font-size="20">模块协同，而非过早</text>
    <text x="848" y="352" fill="#92400E" font-size="20">引入复杂 DSL</text>

    <rect x="1172" y="170" width="320" height="220" rx="24" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
    <text x="1208" y="228" fill="#4C1D95" font-size="28" font-weight="700">规则与站点响应</text>
    <text x="1208" y="282" fill="#5B21B6" font-size="20">兼顾细粒度请求裁决</text>
    <text x="1208" y="318" fill="#5B21B6" font-size="20">与站点治理场景下的</text>
    <text x="1208" y="352" fill="#5B21B6" font-size="20">统一响应控制</text>

    <rect x="290" y="480" width="1020" height="180" rx="28" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="2"/>
    <text x="800" y="540" text-anchor="middle" fill="#111827" font-size="32" font-weight="700">共同指向的总体设计目标</text>
    <text x="800" y="590" text-anchor="middle" fill="#374151" font-size="24">轻量可部署 · 分层协同 · 统一抽象 · 可观测可运维</text>
    <text x="800" y="630" text-anchor="middle" fill="#4B5563" font-size="20">在本科课题背景下，优先构建一套真实可运行、能解释设计取舍、可展示完整闭环的系统</text>
  </g>

  <path d="M252 390L420 480" stroke="#9CA3AF" stroke-width="5" stroke-linecap="round"/>
  <path d="M612 390L650 480" stroke="#9CA3AF" stroke-width="5" stroke-linecap="round"/>
  <path d="M972 390L950 480" stroke="#9CA3AF" stroke-width="5" stroke-linecap="round"/>
  <path d="M1332 390L1180 480" stroke="#9CA3AF" stroke-width="5" stroke-linecap="round"/>
</svg>
