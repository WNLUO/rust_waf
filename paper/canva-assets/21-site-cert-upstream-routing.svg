<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="720" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1504" height="624" rx="28" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="2"/>
  <text x="92" y="108" fill="#111827" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700">站点、证书与上游匹配流程</text>

  <rect x="110" y="240" width="250" height="170" rx="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="235" y="306" text-anchor="middle" fill="#1E3A8A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">客户端请求</text>
  <text x="235" y="346" text-anchor="middle" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">Host / SNI / 监听端口</text>

  <rect x="430" y="180" width="320" height="340" rx="28" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="590" y="250" text-anchor="middle" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700">站点匹配</text>
  <text x="590" y="298" text-anchor="middle" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">primary_hostname</text>
  <text x="590" y="332" text-anchor="middle" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">listen_ports / enabled</text>
  <text x="590" y="366" text-anchor="middle" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">解析特定的站点接管配置</text>

  <rect x="840" y="180" width="320" height="340" rx="28" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="1000" y="250" text-anchor="middle" fill="#78350F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700">证书与 TLS</text>
  <text x="1000" y="298" text-anchor="middle" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">按 SNI 选择对应证书 ID</text>
  <text x="1000" y="332" text-anchor="middle" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">支持多协议托管证书</text>
  <text x="1000" y="366" text-anchor="middle" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">维护监听层证书热重载</text>

  <rect x="1250" y="180" width="250" height="340" rx="28" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="1375" y="250" text-anchor="middle" fill="#4C1D95" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700">上游治理</text>
  <text x="1375" y="298" text-anchor="middle" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">server_name 解析</text>
  <text x="1375" y="332" text-anchor="middle" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">健康检查状态判断</text>
  <text x="1375" y="366" text-anchor="middle" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">Fail-open / close</text>
  <text x="1375" y="400" text-anchor="middle" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">完成最终代理转发</text>

  <path d="M360 325H430" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round"/>
  <path d="M750 325H840" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round"/>
  <path d="M1160 325H1250" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round"/>
</svg>
