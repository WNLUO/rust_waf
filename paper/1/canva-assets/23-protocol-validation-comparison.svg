<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="760" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1504" height="664" rx="28" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="2"/>
  <text x="92" y="108" fill="#111827" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700">HTTP/1.1、HTTP/2、HTTP/3 协议验证对比</text>

  <rect x="80" y="180" width="440" height="420" rx="28" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="120" y="250" fill="#1E3A8A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">HTTP/1.1</text>
  <text x="120" y="310" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">验证方式：curl 直连明文入口</text>
  <text x="120" y="350" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">实验结果：308 Permanent Redirect</text>
  <text x="120" y="390" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">说明：承担明文入口与 HTTPS 重定向</text>

  <rect x="580" y="180" width="440" height="420" rx="28" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="620" y="250" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">HTTP/2</text>
  <text x="620" y="310" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">验证方式：curl --http2 访问加密入口</text>
  <text x="620" y="350" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">实验结果：HTTP/2 200，返回 allowed</text>
  <text x="620" y="390" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">说明：已完成实际请求与统一检测</text>

  <rect x="1080" y="180" width="440" height="420" rx="28" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="1120" y="250" fill="#78350F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="700">HTTP/3</text>
  <text x="1120" y="310" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">验证方式：配置检查 + 自动化测试</text>
  <text x="1120" y="350" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">实验结果：监听启动，单元测试通过</text>
  <text x="1120" y="390" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">边界说明：实验环境缺少 QUIC 客户端</text>

  <rect x="170" y="620" width="1260" height="60" rx="20" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="2"/>
  <text x="800" y="658" text-anchor="middle" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">验证结论：三种协议均已纳入处理逻辑，实验数据支撑程度随环境条件存在差异。</text>
</svg>
