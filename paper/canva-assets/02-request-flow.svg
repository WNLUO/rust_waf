<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="960" fill="#F4F7FB"/>
  <text x="80" y="96" fill="#1E2C3A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="700">请求处理流程图</text>
  <text x="80" y="134" fill="#5E7387" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">可用于论文第 4 章或答辩流程页，导入 Canva 后可继续拆分节点</text>

  <g font-family="PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="620" y="170" width="360" height="86" rx="22" fill="#DCEBFA" stroke="#7FB0E0" stroke-width="2"/>
    <text x="760" y="222" text-anchor="middle" fill="#234A72" font-size="28" font-weight="700">客户端请求进入系统</text>

    <rect x="620" y="304" width="360" height="86" rx="22" fill="#E4F4E3" stroke="#89BB88" stroke-width="2"/>
    <text x="760" y="356" text-anchor="middle" fill="#2E602E" font-size="28" font-weight="700">构建 PacketInfo</text>

    <rect x="620" y="438" width="360" height="86" rx="22" fill="#FFF2DA" stroke="#DDAA54" stroke-width="2"/>
    <text x="760" y="490" text-anchor="middle" fill="#8A5A12" font-size="28" font-weight="700">L4 检测</text>

    <rect x="240" y="580" width="340" height="96" rx="24" fill="#FCEBEC" stroke="#DF9AA2" stroke-width="2"/>
    <text x="410" y="628" text-anchor="middle" fill="#8A3744" font-size="28" font-weight="700">命中阻断</text>
    <text x="410" y="662" text-anchor="middle" fill="#A15C67" font-size="20">写入安全事件 / 封禁 IP</text>

    <rect x="620" y="580" width="360" height="96" rx="24" fill="#E8F1FB" stroke="#7FB0E0" stroke-width="2"/>
    <text x="800" y="628" text-anchor="middle" fill="#234A72" font-size="28" font-weight="700">协议识别</text>
    <text x="800" y="662" text-anchor="middle" fill="#486989" font-size="20">HTTP/1.1 · HTTP/2 · HTTP/3</text>

    <rect x="620" y="724" width="360" height="96" rx="24" fill="#F4EAF8" stroke="#B888D6" stroke-width="2"/>
    <text x="800" y="772" text-anchor="middle" fill="#6E3D88" font-size="28" font-weight="700">统一请求抽象 + L7 检测</text>
    <text x="800" y="806" text-anchor="middle" fill="#7F5A97" font-size="20">规则匹配 / respond / alert / allow</text>

    <rect x="1100" y="724" width="340" height="96" rx="24" fill="#FBEFD8" stroke="#D8AE59" stroke-width="2"/>
    <text x="1270" y="772" text-anchor="middle" fill="#7B5410" font-size="28" font-weight="700">网关代理与上游治理</text>
    <text x="1270" y="806" text-anchor="middle" fill="#8A6B34" font-size="20">站点匹配 / 证书 / 健康检查 / 转发</text>
  </g>

  <path d="M800 256V304" stroke="#7D8C99" stroke-width="6" stroke-linecap="round"/>
  <path d="M800 390V438" stroke="#7D8C99" stroke-width="6" stroke-linecap="round"/>
  <path d="M800 524V580" stroke="#7D8C99" stroke-width="6" stroke-linecap="round"/>
  <path d="M800 676V724" stroke="#7D8C99" stroke-width="6" stroke-linecap="round"/>
  <path d="M980 772H1100" stroke="#7D8C99" stroke-width="6" stroke-linecap="round"/>
  <path d="M620 486C500 486 410 532 410 580" stroke="#7D8C99" stroke-width="6" stroke-linecap="round"/>

  <path d="M800 288L788 270H812L800 288Z" fill="#7D8C99"/>
  <path d="M800 422L788 404H812L800 422Z" fill="#7D8C99"/>
  <path d="M800 558L788 540H812L800 558Z" fill="#7D8C99"/>
  <path d="M800 702L788 684H812L800 702Z" fill="#7D8C99"/>
  <path d="M1078 772L1060 760V784L1078 772Z" fill="#7D8C99"/>

  <text x="116" y="892" fill="#56697C" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">建议配套讲解：L4 负责“先粗筛”，L7 负责“再精判”，若未被阻断则继续进入多站点网关转发与持久化审计链路。</text>
</svg>
