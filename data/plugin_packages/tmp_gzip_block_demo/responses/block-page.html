<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>请求已拦截</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #f7efe5, #fffaf4 45%, #f3e0c7);
      color: #2c241b;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .panel {
      width: min(92vw, 720px);
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(120,92,58,0.15);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(88, 53, 18, 0.16);
      backdrop-filter: blur(10px);
    }
    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #2b6cb0;
      color: white;
      font-size: 12px;
      letter-spacing: 0.08em;
    }
    h1 { margin: 18px 0 12px; font-size: 34px; }
    p { margin: 0 0 12px; line-height: 1.7; color: #5b4b3c; }
    .tip {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #fff7ed;
      border: 1px solid rgba(194,120,51,0.18);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <section class="panel">
    <span class="eyebrow">WAF DEMO</span>
    <h1>当前请求已被安全策略拦截</h1>
    <p>这是一个通过插件包安装的示例动作页面。</p>
    <p>该页面由规则命中后直接返回，响应体采用 gzip 压缩传输。</p>
    <div class="tip">你可以把这个插件动作绑定到任意 L7 规则，保存后直接生效。</div>
  </section>
</body>
</html>
