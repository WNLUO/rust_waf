  <text x="1266" y="502" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">L4 / L7 管理</text>
  <text x="1266" y="554" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">负责配置操作、实时观测</text>
  <text x="1266" y="582" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">自动化接管与运维协同</text>

