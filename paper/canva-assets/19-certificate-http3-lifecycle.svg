<svg width="1800" height="800" viewBox="0 0 1800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF" />
    </marker>
  </defs>

  <rect width="1800" height="800" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1704" height="704" rx="30" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="2"/>
  <text x="92" y="120" fill="#111827" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="700">证书生命周期与 HTTP/3 托管刷新机制</text>

  <!-- Node 1: 启动检查 -->
  <rect x="100" y="310" width="280" height="180" rx="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="240" y="390" text-anchor="middle" fill="#1E3A8A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">1. 启动检查</text>
  <text x="240" y="440" text-anchor="middle" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">读取配置与本地存储</text>

  <!-- Node 2: 复用证书 (Upper path) -->
  <rect x="500" y="160" width="320" height="180" rx="24" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="660" y="240" text-anchor="middle" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">复用本地证书</text>
  <text x="660" y="290" text-anchor="middle" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">加载为默认启动证书</text>

  <!-- Node 3: 生成证书 (Lower path) -->
  <rect x="500" y="460" width="320" height="180" rx="24" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="660" y="540" text-anchor="middle" fill="#78350F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">生成自签证书</text>
  <text x="660" y="590" text-anchor="middle" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">缺失时自动创建并落库</text>

  <!-- Node 4: 写入托管 -->
  <rect x="940" y="310" width="360" height="180" rx="24" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="1120" y="390" text-anchor="middle" fill="#4C1D95" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">写入 HTTP/3 托管</text>
  <text x="1120" y="440" text-anchor="middle" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">data/http3/managed/*.pem</text>

  <!-- Node 5: 协议热刷新 -->
  <rect x="1420" y="310" width="300" height="180" rx="24" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="1570" y="390" text-anchor="middle" fill="#7F1D1D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">QUIC 协议热刷新</text>
  <text x="1570" y="440" text-anchor="middle" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24">监听重载与证书应用</text>

  <!-- Connections -->
  <!-- 1 to 2 (elbow) -->
  <path d="M 380 400 L 440 400 L 440 250 L 500 250" fill="none" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <!-- 1 to 3 (elbow) -->
  <path d="M 380 400 L 440 400 L 440 550 L 500 550" fill="none" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <!-- 2 to 4 (elbow) -->
  <path d="M 820 250 L 880 250 L 880 400 L 940 400" fill="none" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <!-- 3 to 4 (elbow) -->
  <path d="M 820 550 L 880 550 L 880 400 L 940 400" fill="none" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <!-- 4 to 5 (straight) -->
  <path d="M 1300 400 L 1420 400" fill="none" stroke="#9CA3AF" stroke-width="5" marker-end="url(#arrow-blue)"/>
</svg>
