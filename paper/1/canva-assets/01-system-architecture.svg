<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="760" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1504" height="660" rx="32" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="2"/>
  <text x="88" y="110" fill="#111827" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700">Rust WAF 系统总体架构</text>

  <rect x="88" y="160" width="220" height="500" rx="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="118" y="216" fill="#1E3A8A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">监听接入层</text>
  <text x="118" y="262" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">TCP 监听</text>
  <text x="118" y="302" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">UDP / QUIC</text>
  <text x="118" y="342" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">TLS 终止</text>
  <text x="118" y="382" fill="#1E40AF" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">HTTP/3 入口</text>
  <text x="118" y="438" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">负责多协议接入、</text>
  <text x="118" y="466" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">监听器启动与</text>
  <text x="118" y="494" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">并发连接限制</text>

  <rect x="352" y="160" width="260" height="500" rx="24" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="384" y="216" fill="#14532D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">检测决策层</text>
  <text x="384" y="262" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">L4 连接跟踪</text>
  <text x="384" y="302" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">速率限制 / 黑名单</text>
  <text x="384" y="342" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">协议识别</text>
  <text x="384" y="382" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">统一请求抽象</text>
  <text x="384" y="422" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">L7 规则引擎</text>
  <text x="384" y="462" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">respond / block /</text>
  <text x="384" y="490" fill="#166534" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">alert</text>
  <text x="384" y="530" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">负责粗筛与精判协同，</text>
  <text x="384" y="558" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">把不同协议流量</text>
  <text x="384" y="586" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">统一送入同一套</text>
  <text x="384" y="614" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">裁决逻辑</text>

  <rect x="656" y="160" width="240" height="500" rx="24" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
