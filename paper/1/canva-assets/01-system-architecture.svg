  <text x="688" y="302" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">证书选择</text>
  <text x="688" y="342" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">上游健康检查</text>
  <text x="688" y="382" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">Fail-open / close</text>
  <text x="688" y="422" fill="#92400E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">请求转发</text>
  <text x="688" y="490" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">负责网关化部署、</text>
  <text x="688" y="518" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">多站点证书与</text>
  <text x="688" y="546" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">后端可用性治理</text>

  <rect x="940" y="160" width="250" height="500" rx="24" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
