  <text x="972" y="262" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">SQLite 配置</text>
  <text x="972" y="302" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">规则 / 覆盖配置</text>
  <text x="972" y="342" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">security_events</text>
  <text x="972" y="382" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">行为画像 / 指纹档案</text>
