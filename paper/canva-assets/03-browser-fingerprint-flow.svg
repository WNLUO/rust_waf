<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="960" fill="#FBF7F2"/>
  <text x="80" y="96" fill="#2C241D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="700">浏览器指纹诱导链路图</text>
  <text x="80" y="134" fill="#7A6D60" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20">对应最新程序改动，适合放进 Canva 做答辩页或补论文插图</text>

  <rect x="100" y="220" width="280" height="520" rx="28" fill="#E8F1FB" stroke="#7FB0E0" stroke-width="2"/>
  <text x="140" y="286" fill="#234A72" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">1. 命中诱导规则</text>
  <text x="140" y="344" fill="#486989" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">规则动作为 respond</text>
  <text x="140" y="382" fill="#486989" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">绑定浏览器指纹模板</text>
  <text x="140" y="438" fill="#5D7994" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">向客户端返回一个看似</text>
  <text x="140" y="466" fill="#5D7994" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">正常的 HTML 页面，</text>
  <text x="140" y="494" fill="#5D7994" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">但内部嵌入采集脚本</text>

  <rect x="430" y="220" width="320" height="520" rx="28" fill="#EEF7EC" stroke="#8ABB8A" stroke-width="2"/>
  <text x="470" y="286" fill="#285B2D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">2. 浏览器侧采集</text>
  <text x="470" y="344" fill="#4C744F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">Canvas / WebGL</text>
  <text x="470" y="382" fill="#4C744F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">字体列表 / 时区 / 语言</text>
  <text x="470" y="420" fill="#4C744F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">屏幕尺寸 / viewport</text>
  <text x="470" y="458" fill="#4C744F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">webdriver 状态</text>
  <text x="470" y="516" fill="#5D7A5F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">脚本会先生成 fingerprintId，</text>
  <text x="470" y="544" fill="#5D7A5F" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">再把采集结果序列化为 JSON</text>

  <rect x="800" y="220" width="320" height="520" rx="28" fill="#FFF4DF" stroke="#E3B765" stroke-width="2"/>
  <text x="840" y="286" fill="#7B5410" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">3. 干扰式验证层</text>
  <text x="840" y="344" fill="#8A6B34" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">渲染高数题挑战面板</text>
  <text x="840" y="382" fill="#8A6B34" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">没有真实通过路径</text>
  <text x="840" y="420" fill="#8A6B34" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">记录尝试次数与题目等级</text>
  <text x="840" y="458" fill="#8A6B34" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">按节奏回传部分作答信息</text>
  <text x="840" y="516" fill="#8F7442" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">定位是“诱导与画像采集”，</text>
  <text x="840" y="544" fill="#8F7442" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">不是正式身份校验系统</text>

  <rect x="1170" y="220" width="320" height="520" rx="28" fill="#F6EBFA" stroke="#BB8AD9" stroke-width="2"/>
  <text x="1210" y="286" fill="#69348A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">4. 后端事件落库</text>
  <text x="1210" y="344" fill="#7F5A98" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">POST /.well-known/waf/</text>
  <text x="1210" y="378" fill="#7F5A98" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">browser-fingerprint-report</text>
  <text x="1210" y="430" fill="#7F5A98" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">补充来源 IP 与站点元数据</text>
  <text x="1210" y="468" fill="#7F5A98" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">写入 security_events</text>
  <text x="1210" y="506" fill="#7F5A98" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">provider=browser_fingerprint</text>
  <text x="1210" y="562" fill="#8D6AA2" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">控制台事件页可按来源系统筛选，</text>
  <text x="1210" y="590" fill="#8D6AA2" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">形成“页面诱导 - 回传 - 审计”闭环</text>

  <path d="M380 480H430" stroke="#8E8173" stroke-width="6" stroke-linecap="round"/>
  <path d="M750 480H800" stroke="#8E8173" stroke-width="6" stroke-linecap="round"/>
  <path d="M1120 480H1170" stroke="#8E8173" stroke-width="6" stroke-linecap="round"/>
  <path d="M412 480L394 468V492L412 480Z" fill="#8E8173"/>
  <path d="M782 480L764 468V492L782 480Z" fill="#8E8173"/>
  <path d="M1152 480L1134 468V492L1152 480Z" fill="#8E8173"/>

  <rect x="100" y="790" width="1390" height="88" rx="20" fill="#F1E7DA"/>
  <text x="132" y="840" fill="#5C4C3D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">答辩可直接讲这句话：该模板不是为了真正放行请求，而是把前端脚本采样、攻击者时间消耗和后端事件审计串成一条可观测的对抗链路。</text>
</svg>
