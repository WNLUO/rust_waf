  <rect x="88" y="760" width="1424" height="128" rx="22" fill="#F1E7DA"/>
  <text x="122" y="808" fill="#5A4C3E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">讲解时可概括为：前端流量先进入多协议接入层，由 L4 进行快速粗筛，再交给 L7 统一请求抽象与规则裁决，</text>
  <text x="122" y="842" fill="#5A4C3E" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">随后配合网关治理、SQLite 审计落库和 Vue 控制台，形成“检测、转发、配置、联动、展示”一体化闭环。</text>
</svg>
