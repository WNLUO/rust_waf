name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  rust:
    name: Rust Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo check
        run: cargo check

      - name: cargo test
        run: cargo test

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vue/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run lint
        run: npm run lint

      - name: npm run typecheck
        run: npm run typecheck

      - name: npm run format:check
        run: npm run format:check

      - name: npm run build
        run: npm run build
