  <text x="972" y="462" fill="#5B21B6" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">站点 / 证书 / 同步</text>
  <text x="972" y="518" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">负责统一审计、画像沉淀</text>
  <text x="972" y="546" fill="#374151" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18">策略保存与联动状态落库</text>

  <rect x="1234" y="160" width="250" height="500" rx="24" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="1266" y="216" fill="#7F1D1D" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">管理控制层</text>
  <text x="1266" y="262" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">Axum API</text>
  <text x="1266" y="302" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">Vue 控制台</text>
  <text x="1266" y="342" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">总览 / 流量地图</text>
  <text x="1266" y="382" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">系统设置 / 站点</text>
  <text x="1266" y="422" fill="#991B1B" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22">规则 / 动作中心</text>
